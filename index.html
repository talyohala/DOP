<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>Dop</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background-color: #050505;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
      }
      
      #splash img {
        width: 180px; /* הלוגו הוגדל משמעותית */
        border-radius: 30px; /* פינות מעוגלות וחלקות */
        opacity: 0;
        animation: elegantReveal 2s forwards ease-out;
      }

      @keyframes elegantReveal {
        0% { opacity: 0; transform: scale(0.85) translateY(15px); filter: drop-shadow(0 0 0 rgba(16, 185, 129, 0)); }
        40% { opacity: 1; transform: scale(1.02) translateY(0); filter: drop-shadow(0 0 40px rgba(16, 185, 129, 0.5)); } /* זוהר מנטה חזק ורחב יותר */
        100% { opacity: 1; transform: scale(1) translateY(0); filter: drop-shadow(0 0 25px rgba(16, 185, 129, 0.3)); }
      }

      body.loaded #splash {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  <body style="background-color: #050505; margin: 0;">
    
    <div id="splash">
      <img src="/icon.png" alt="Dop Logo" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.body.classList.add('loaded');
        }, 2200); 
      });
    </script>
  </body>
</html>
